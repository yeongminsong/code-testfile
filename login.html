<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CG5VPJWVEQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-CG5VPJWVEQ');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Devlog 로그인 및 회원가입 페이지입니다.">
  <title>로그인 — 매일이슈</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
  <link href="/style.css" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5414405329595188" crossorigin="anonymous"></script>
</head>
<body class="auth-page">

  <header class="site-header">
    <div class="header-inner">
      <a href="/index.html" class="logo">매일이슈</a>
      <nav class="nav">
        <a href="/index.html">홈</a>
        <a href="/category.html">카테고리</a>
        <a href="/tags.html">태그</a>
        <a href="/about.html">소개</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">🌙</button>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab">로그인</button>
        <button class="auth-tab" id="signupTab">회원가입</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm">
        <h2 class="auth-title">다시 돌아오셨군요 👋</h2>
        <p class="auth-sub">매일이슈에 로그인하세요.</p>

        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="hello@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">
            비밀번호
            <a href="mailto:contact@mailissue.co.kr" class="form-label-link">비밀번호 찾기</a>
          </label>
          <div class="input-wrap">
            <input type="password" class="form-input" id="loginPw" placeholder="비밀번호 입력" required>
            <button type="button" class="pw-toggle" data-target="loginPw">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-full">로그인</button>
        <div id="loginMsg" style="display:none;"></div>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="signupForm">
        <h2 class="auth-title">함께해요 ✨</h2>
        <p class="auth-sub">매일이슈 계정을 만들어보세요.</p>

        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input type="text" class="form-input" id="signupName" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" class="form-input" id="signupEmail" placeholder="hello@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <div class="input-wrap">
            <input type="password" class="form-input" id="signupPw" placeholder="8자 이상 입력" required>
            <button type="button" class="pw-toggle" data-target="signupPw">👁</button>
          </div>
          <div class="pw-strength" id="pwStrength"></div>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 확인</label>
          <div class="input-wrap">
            <input type="password" class="form-input" id="signupPwConfirm" placeholder="비밀번호 재입력" required>
            <button type="button" class="pw-toggle" data-target="signupPwConfirm">👁</button>
          </div>
        </div>

        <label class="checkbox-label">
          <input type="checkbox" id="agree" required>
          <span><a href="/terms.html" class="form-label-link">이용약관</a> 및 <a href="/privacy.html" class="form-label-link">개인정보처리방침</a>에 동의합니다.</span>
        </label>

        <button type="submit" class="btn-primary btn-full">회원가입</button>
        <div id="signupMsg" style="display:none;"></div>
      </form>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">매일이슈</span>
      <p>매일 이슈와 꿀팁을 전합니다 · contact@mailissue.co.kr</p>
      <div class="footer-links">
        <a href="/terms.html">이용약관</a>
        <a href="/privacy.html">개인정보처리방침</a>
      </div>
    </div>
  </footer>

  <script src="/main.js"></script>
</body>
</html>

<html lang="ko" data-theme="light">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CG5VPJWVEQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TOEFL 라이팅 Integrated/Independent 태스크 타이머 연습. 랜덤 프롬프트, 카운트다운, 단어 수 카운트 제공.">
  <title>TOEFL Writing Practice — Devlog</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
  <link href="/style.css" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/index.html" class="logo">Devlog</a>
      <nav class="nav">
        <a href="/index.html">홈</a>
        <a href="/category.html">카테고리</a>
        <a href="/tags.html">태그</a>
        <a href="/toefl.html" class="nav-active">TOEFL</a>
        <a href="/about.html">소개</a>
        <a href="/toefl.html" class="nav-active">TOEFL</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">🌙</button>
        <a href="/login.html" class="btn-login">로그인</a>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="page-hero-inner">
      <h1 class="page-title">TOEFL Writing Practice</h1>
      <p class="page-desc">Integrated · Independent 태스크를 타이머와 함께 실전처럼 연습하세요.</p>
    </div>
  </section>

  <main class="main-content" id="toeflPractice">

    <!-- Task Type Select -->
    <div class="toefl-type-bar">
      <button class="toefl-type-btn active" data-type="integrated">
        <span class="toefl-type-label">Integrated</span>
        <span class="toefl-type-sub">읽기 지문 → 20분 작성 · 150–225 words</span>
      </button>
      <button class="toefl-type-btn" data-type="independent">
        <span class="toefl-type-label">Independent</span>
        <span class="toefl-type-sub">주제 에세이 → 30분 작성 · 300+ words</span>
      </button>
    </div>

    <!-- Prompt Area -->
    <div class="toefl-prompt-card" id="toeflPromptCard">
      <div class="toefl-prompt-header">
        <span class="toefl-prompt-badge" id="toeflBadge">Integrated Task</span>
        <button class="toefl-new-btn" id="toeflNewPrompt">새 문제 뽑기</button>
      </div>

      <!-- Integrated: reading passage -->
      <div id="toeflPassageWrap">
        <p class="toefl-passage-note">📖 아래 지문을 읽고 질문에 답하세요. (실제 시험에서는 3분간 읽은 후 강의를 듣습니다.)</p>
        <div class="toefl-passage" id="toeflPassage"></div>
      </div>

      <div class="toefl-question" id="toeflQuestion"></div>
    </div>

    <!-- Timer + Controls -->
    <div class="toefl-timer-row">
      <div class="toefl-timer-display">
        <span class="toefl-timer-icon">⏱</span>
        <span class="toefl-timer-text" id="toeflTimerText">20:00</span>
      </div>
      <div class="toefl-timer-btns">
        <button class="toefl-ctrl-btn toefl-ctrl-start" id="toeflStart">시작</button>
        <button class="toefl-ctrl-btn toefl-ctrl-pause" id="toeflPause" disabled>일시정지</button>
        <button class="toefl-ctrl-btn toefl-ctrl-reset" id="toeflReset">초기화</button>
      </div>
    </div>

    <!-- Timer Progress Bar -->
    <div class="toefl-progress-wrap">
      <div class="toefl-progress-bar" id="toeflProgressBar"></div>
    </div>

    <!-- Writing Area -->
    <div class="toefl-editor-wrap">
      <textarea
        class="toefl-editor"
        id="toeflEditor"
        placeholder="여기에 답안을 작성하세요..."
        spellcheck="true"
      ></textarea>

      <div class="toefl-editor-footer">
        <div class="toefl-word-info">
          <span class="toefl-word-count" id="toeflWordCount">0</span>
          <span class="toefl-word-label" id="toeflWordLabel">/ 최소 150 words</span>
          <span class="toefl-word-status" id="toeflWordStatus"></span>
        </div>
        <div class="toefl-editor-actions">
          <button class="toefl-action-btn" id="toeflSave">💾 임시저장</button>
          <button class="toefl-action-btn toefl-action-danger" id="toeflClear">지우기</button>
        </div>
      </div>
    </div>

    <!-- Save Notice -->
    <p class="toefl-save-msg" id="toeflSaveMsg"></p>

    <!-- Tips -->
    <div class="toefl-tips">
      <h2 class="toefl-tips-title">작성 팁</h2>
      <div class="toefl-tips-grid" id="toeflTipsGrid"></div>
    </div>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">Devlog</span>
      <p>즐겁게 만들고 기록합니다 · contact@devlog.kr</p>
      <div class="footer-links">
        <a href="/terms.html">이용약관</a>
        <a href="/privacy.html">개인정보처리방침</a>
      </div>
    </div>
  </footer>

  <script src="/main.js"></script>
</body>
</html>
